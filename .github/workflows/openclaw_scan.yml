name: OpenClaw DevSecOps Pipeline

# 코드가 develop 브랜치에 Push되거나 PR이 올라올 때마다 자동으로 실행됩니다.
on:
  push:
    branches: [ "develop" ]
  pull_request:
    branches: [ "develop" ]

jobs:
  security-scan:
    runs-on: ubuntu-latest  # 1회용 리눅스 서버 환경

    steps:
    - name: 📦 저장소 코드 가져오기 (Checkout)
      uses: actions/checkout@v4

    - name: 🐍 파이썬 3.11 환경 세팅
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        cache: 'pip'

    - name: 🛠️ 의존성 패키지 설치
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: 🎯 모의 타겟 서버 백그라운드 가동 (Terminal 1 역할)
      run: |
        cd target_app_mock
        # 명령어 끝의 '&'는 백그라운드 실행을 의미합니다.
        uvicorn app:app --host 127.0.0.1 --port 3000 &
        sleep 3 # 서버가 켜질 때까지 잠시 대기

    - name: 🧠 OpenClaw 엔진 백그라운드 가동 (Terminal 2 역할)
      run: |
        python main.py serve &
        sleep 3 # 엔진이 켜질 때까지 잠시 대기

    - name: 🚀 취약점 스캔 파이프라인 시작 (Terminal 3 역할)
      run: |
        python main.py scan start http://127.0.0.1:3000 ./target_app_mock
